<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Shop Log</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Minecraft Shop Log</h1>
        <p>Sube tu archivo de log de Minecraft para calcular el valor de los objetos vendidos al /shop de DiosesMC.</p>
        <label for="logFile" class="custom-file-upload">Elegir archivo</label>
        <input type="file" id="logFile" accept=".log,.txt">
        <div id="results"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
