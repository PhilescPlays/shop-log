<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Shop Log</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Minecraft Shop Log</h1>
        <p>Sube tu archivo de log de Minecraft para calcular el valor de los objetos vendidos al /shop de DiosesMC.</p>
        <label for="logFile" class="custom-file-upload" id="fileUploadLabel">Elegir archivo</label>
        <input type="file" id="logFile" accept=".log,.txt,.gz">
        <div id="file-name-display" class="file-name" style="display:none;"></div>
        <div id="results"></div>
        <button id="copyImageBtn" class="custom-file-upload" style="display:none;">Copiar imagen</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
